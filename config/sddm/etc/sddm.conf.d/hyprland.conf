# ============================
# SDDM Configuration
# ============================
# This config enables autologin (optional) and sets Hyprland as default session
# To enable autologin, uncomment the User line and set your username

[Autologin]
# Uncomment and set your username for automatic login
# User=

# Default session to launch
Session=hyprland

[Theme]
# You can set a theme here if you install one
# Current=

[General]
# Display server to use
DisplayServer=wayland
