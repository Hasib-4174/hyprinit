# ============================
# vars.conf - User Configuration
# ============================
# Edit these settings before running install.sh

# AUR helper (yay or paru)
AUR_HELPER=yay

# Default shell
DEFAULT_SHELL=zsh

# ============================
# Service Toggles (true/false)
# ============================
# Basic services (recommended to keep enabled)
ENABLE_NETWORKMANAGER=true
ENABLE_BLUETOOTH=true
ENABLE_SDDM=true

# ============================
# Services Requiring User Action
# ============================
# These are SKIPPED by default because they need post-install setup
# Set to true only if you've already configured them

# Tailscale VPN - requires: tailscale up (browser auth)
ENABLE_TAILSCALE=false
