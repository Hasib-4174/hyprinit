# ============================
# vars.conf - User Configuration
# ============================
# Edit these settings before running install.sh

# ============================
# Dotfiles Repository
# ============================
# Your separate dotfiles repo (GNU Stow structure)
DOTFILES_REPO="https://github.com/Hasib-4174/dotfiles.git"
DOTFILES_DIR="$HOME/dotfiles"

# Stow packages to deploy (space-separated)
# Must match directory names in your dotfiles repo
STOW_PACKAGES="alacritty awww fontconfig hypr mako nano nvim rofi scripts swappy waybar zshrc"

# ============================
# System Configuration
# ============================
# AUR helper (yay or paru)
AUR_HELPER=yay

# Default shell
DEFAULT_SHELL=zsh

# ============================
# Service Toggles (true/false)
# ============================
# Basic services (recommended to keep enabled)
ENABLE_NETWORKMANAGER=true
ENABLE_BLUETOOTH=true
ENABLE_SDDM=true

# ============================
# Optional Services
# ============================
# Docker — simple install, no storage relocation
# Set to true to enable docker.service and add user to docker group
ENABLE_DOCKER=false

# Tailscale VPN — requires: tailscale up (browser auth)
ENABLE_TAILSCALE=false
